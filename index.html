<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Rozliczenia Treningów</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: sans-serif; padding: 2rem; background: #111; color: #fff; }
    input, select, button { margin: 0.5rem 0; padding: 0.5rem; }
    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th, td { border: 1px solid #555; padding: 0.5rem; text-align: left; }
    button { cursor: pointer; background: #55B4FF; color: black; border: none; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>Rozliczenia Treningów</h1>

  <h3>Dodaj zawodnika</h3>
  <input type="text" id="name" placeholder="Imię i nazwisko">
  <input type="text" id="phone" placeholder="Telefon">
  <button onclick="dodajZawodnika()">Dodaj</button>

  <h3>Dodaj trening</h3>
  <select id="zawodnikSelect"></select><br>
  <input type="date" id="data">
  <select id="stawka">
    <option value="60">60</option>
    <option value="80">80</option>
    <option value="110">110</option>
    <option value="50">50</option>
  </select>
  <button onclick="dodajTrening()">Dodaj trening</button>

  <h3>Treningi</h3>
  <table id="tabela">
    <thead>
      <tr><th>Zawodnik</th><th>Data</th><th>Stawka</th></tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const SUPABASE_URL = "https://vwthvwqcqlsnikvqdeia.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3dGh2d3FjcWxzbmlrdnFkZWlhIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1MzczMDI2NCwiZXhwIjoyMDY5MzA2MjY0fQ.IRZwe-xSdLbOGPLTupsGubivGV6_-jRgw3C-9zPfpKA";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function ladujZawodnikow() {
      const { data, error } = await supabase.from("zawodnicy").select("*");
      const select = document.getElementById("zawodnikSelect");
      select.innerHTML = "";
      data.forEach(z => {
        const opt = document.createElement("option");
        opt.value = z.name;
        opt.textContent = z.name;
        select.appendChild(opt);
      });
    }

    async function dodajZawodnika() {
      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      if (!name || !phone) return alert("Uzupełnij dane!");
      await supabase.from("zawodnicy").insert([{ name, phone }]);
      document.getElementById("name").value = "";
      document.getElementById("phone").value = "";
      ladujZawodnikow();
    }

    async function dodajTrening() {
      const zawodnik = document.getElementById("zawodnikSelect").value;
      const data = document.getElementById("data").value;
      const stawka = document.getElementById("stawka").value;
      if (!zawodnik || !data || !stawka) return alert("Uzupełnij dane!");
      await supabase.from("treningi").insert([{ zawodnik, data, stawka }]);
      ladujTreningi();
    }

    async function ladujTreningi() {
      const { data, error } = await supabase.from("treningi").select("*").order("data", { ascending: false });
      const tabela = document.querySelector("#tabela tbody");
      tabela.innerHTML = "";
      data.forEach(t => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td>${t.zawodnik}</td><td>${t.data}</td><td>${t.stawka} zł</td>`;
        tabela.appendChild(tr);
      });
    }

    // Inicjalizacja
    ladujZawodnikow();
    ladujTreningi();
    document.getElementById("data").value = new Date().toISOString().split("T")[0];
  </script>
</body>
</html>
