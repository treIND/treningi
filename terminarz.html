<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Terminarz – CLICKSAFE v2 (naprawa selektów z nazwiskami)</title>
  <style>
    :root{
      --bg:#0b0f14; --text:#e6edf3; --muted:#9fb0c1; --card:#121a26; --border:#1e2a3b; --accent:#5aa7ff;
      --kokoszki:#0a3a75; --pruszcz:#3b3b3b; --inne:#0f5f3d;
      --ok:#69db7c; --warn:#e3b341; --err:#ff6b6b;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:var(--text);}
    header{position:sticky;top:0;background:rgba(11,15,20,.8);backdrop-filter:blur(6px);border-bottom:1px solid var(--border);padding:10px 16px;z-index:3}
    header h1{margin:0;font-size:18px}
    main{padding:16px;display:grid;gap:14px;max-width:1100px;margin:0 auto}
    .day{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}
    .day h2{margin:0 0 10px;font-size:16px;display:flex;gap:8px;align-items:baseline}
    .grid{display:grid;grid-template-columns:1fr;gap:10px}
    @media (min-width:600px){ .grid{grid-template-columns:repeat(2,1fr)} }

    .slot{border:3px solid var(--border);border-radius:12px;padding:10px;transition:.2s border-color,.2s box-shadow,.2s background}
    .slot.loc-kokoszki{border-color:var(--kokoszki);}
    .slot.loc-pruszcz{border-color:var(--pruszcz);}
    .slot.loc-inne{border-color:var(--inne);}
    .slot.published{ border-color: var(--ok); box-shadow: inset 0 0 0 3px rgba(105,219,124,.5); background: rgba(105,219,124,.06); }

    .row{display:grid;grid-template-columns:1fr;gap:8px}
    @media (min-width:520px){ .row{grid-template-columns:1fr 1fr} }
    label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
    select,input[type="text"]{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);}
    .savestatus{margin-top:6px;font-size:12px;color:var(--muted);min-height:1.2em}
    .ok{color:#69db7c}
    .err{color:#ff6b6b}
    .warn{color:#e3b341}
    .btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    button{padding:8px 14px;border:none;border-radius:8px;background:var(--accent);color:#fff;cursor:pointer}
    .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
    button:disabled{opacity:.6;cursor:not-allowed}
    footer{padding:30px 16px;color:var(--muted);text-align:center}
    .hidden{display:none}
  </style>
</head>
<body>
  <header><h1>Terminarz – CLICKSAFE v2</h1></header>
  <main id="app"></main>
  <footer>Wczytuję…</footer>

  <!-- Globalny handler klików (zapasowy) -->
  <script>
    window._clicksafe = {
      async h(btn, action){
        try {
          const slotEl = btn.closest(".slot");
          if(!slotEl) return;
          btn.disabled = true;
          if (action === 'save-plan') await window._clicksafe._savePlan(slotEl);
          else if (action === 'publish') await window._clicksafe._publish(slotEl);
          else if (action === 'clear-plan') await window._clicksafe._clearPlan(slotEl);
        } catch(err){
          console.error(err);
          const st = btn.closest(".slot")?.querySelector(".savestatus");
          if (st) st.innerHTML = '<span class="err">Błąd przycisku</span>';
        } finally{
          btn.disabled = false;
        }
      },
      async _savePlan(){ alert('Skrypt jeszcze się ładuje… spróbuj ponownie za 1–2 sek.'); },
      async _publish(){ alert('Skrypt jeszcze się ładuje… spróbuj ponownie za 1–2 sek.'); },
      async _clearPlan(){ alert('Skrypt jeszcze się ładuje… spróbuj ponownie za 1–2 sek.'); },
    };
  </script>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabase = createClient(
      "https://vwthvwqcqlsnikvqdeia.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ3dGh2d3FjcWxzbmlrdnFkZWlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM3MzAyNjQsImV4cCI6MjA2OTMwNjI2NH0.xgIifQNaBC_4AO-chnUdZlXnKxtAGT4lKPsa_HNKvkk"
    );

    const TABLE_ZAWODNICY = "zawodnicy";
    const TABLE_TERMINARZ = "terminarz";
    const TABLE_TRENINGI  = "treningi";

    const SEND_FROM_TERM_PREFERRED = "send_from_term";
    const SEND_FROM_TERM_FALLBACK  = "send from term";

    const DAYS = ["Poniedziałek","Wtorek","Środa","Czwartek","Piątek","Sobota","Niedziela"];
    const STAWKI = [50,60,70,80,90,100,110,120];
    const LOKALIZACJE = ["Kokoszki","Pruszcz","Inne"];
    const GODZINY = genTimes("06:00","23:45",15);

    const app = document.getElementById("app");
    const today = new Date();
    const nextMonday = (() => {
      const d = new Date(today);
      const dow = d.getDay();
      const delta = ((1 - dow + 7) % 7) || 7;
      d.setDate(d.getDate()+delta);
      d.setHours(0,0,0,0);
      return d;
    })();
    const dates = Array.from({length:7},(_,i)=>{const dt=new Date(nextMonday);dt.setDate(dt.getDate()+i);return dt;});

    // Render
    for(let i=0;i<7;i++){
      const date=dates[i], dayName=DAYS[i];
      const dayEl=document.createElement("section");
      dayEl.className="day";
      dayEl.innerHTML=`
        <h2>${dayName} <span>${fmtDate(date)}</span></h2>
        <div class="grid">${[1,2,3,4].map(blockNo=>`
          <div class="slot" data-day="${dayName}" data-date="${ymd(date)}" data-block="${blockNo}">
            <label>Godzina</label>
            <select data-role="time">${GODZINY.map(t=>`<option value="${t}">${t}</option>`).join("")}</select>
            <label>Blok ${blockNo}</label>
            <div class="row">${[1,2,3,4].map(j=>`
              <div>
                <label>Zawodnik ${j}</label>
                <select data-role="zawodnik"></select>
              </div>`).join("")}</div>
            <div class="row">
              <div>
                <label>Lokalizacja</label>
                <select data-role="lokalizacja">${LOKALIZACJE.map(l=>`<option>${l}</option>`).join("")}</select>
                <input type="text" class="hidden" data-role="lokalizacja-inna" placeholder="Inna lokalizacja"/>
              </div>
              <div>
                <label>Stawka</label>
                <select data-role="stawka">${STAWKI.map(v=>`<option value="${v}">${v}</option>`).join("")}</select>
              </div>
            </div>
            <div class="btns">
              <button data-action="save-plan" type="button" onclick="window._clicksafe.h(this,'save-plan')">Zaplanuj</button>
              <button class="btn-ghost" data-action="publish" type="button" onclick="window._clicksafe.h(this,'publish')">Zapisz treningi</button>
              <button class="btn-ghost" data-action="clear-plan" type="button" onclick="window._clicksafe.h(this,'clear-plan')">Wyczyść plan</button>
            </div>
            <div class="savestatus"></div>
          </div>`).join("")}</div>`;
      app.appendChild(dayEl);
    }

    // Wczytaj listę zawodników – nie blokuje klików
    (async () => {
      try{
        const { data: players, error: playersErr } = await supabase.from(TABLE_ZAWODNICY).select("*").order("name");
        const optionsHtml = playersErr || !players || players.length===0
          ? `<option value="">— wybierz —</option>`
          : [`<option value="">— wybierz —</option>`, ...players.map(r => `<option value="${escapeHtml(r.name)}">${escapeHtml(r.name)}</option>`)].join("");
        document.querySelectorAll('select[data-role="zawodnik"]').forEach(sel => {
          // Zapamiętaj aktualnie wybraną wartość (mogła przyjść z prefill)
          const current = sel.value;
          sel.innerHTML = optionsHtml;
          // Jeśli prefill już ustawił nazwisko, a nie ma go na liście – dołóż opcję i wybierz
          if (current && !Array.from(sel.options).some(o => o.value === current)){
            const opt = document.createElement('option');
            opt.value = current; opt.textContent = current;
            sel.appendChild(opt);
          }
          if (current){ sel.value = current; }
          sel.disabled = !!(playersErr || !players || players.length===0);
        });
        document.querySelector("footer").textContent = playersErr ? "Błąd ładowania zawodników." : "Gotowe.";
      }catch(e){ console.warn(e); }
    })();

    // Prefill z TERMINARZ + overlay z TRENINGI – nie blokuje klików
    (async () => {
      try{ await prefillFromTerminarz(); await overlayFromTreningi(); }catch(e){ console.warn(e); }
    })();

    // Podmień globalne akcje po załadowaniu modułu
    window._clicksafe._savePlan  = savePlan;
    window._clicksafe._publish   = publish;
    window._clicksafe._clearPlan = clearPlan;

    // ===== Helpers =====
    function applyFilterNullable(query, column, value){
      if (value === null || value === undefined){ return query.is(column, null); }
      return query.eq(column, value);
    }
    function delWhere(table, match){
      let q = supabase.from(table).delete();
      q = q.eq('data', match.data);
      q = applyFilterNullable(q, 'location', match.location ?? null);
      q = applyFilterNullable(q, 'stawka', match.stawka ?? null);
      q = applyFilterNullable(q, 'time', match.time ?? null);
      return q;
    }
    function setSelectValue(sel, value){
      if (!value) return;
      const exists = Array.from(sel.options).some(o => o.value === value);
      if (!exists){
        const opt = document.createElement('option');
        opt.value = value;
        opt.textContent = value;
        sel.appendChild(opt);
      }
      sel.value = value;
    }

    async function prefillFromTerminarz(){
      const { data, error } = await supabase
        .from(TABLE_TERMINARZ)
        .select("zawodnik, data, time, stawka, location, status")
        .gte("data", ymd(dates[0]))
        .lte("data", ymd(dates[6]));
      if(error){ console.warn(error); return; }

      const byDate = groupBy(data, r => r.data);
      for (const [dateISO, rows] of Object.entries(byDate)){
        const groups = groupBy(rows, r => `${r.location || ""}|${r.stawka ?? ""}|${r.time ?? ""}`);
        const slots = Array.from(document.querySelectorAll(`.slot[data-date="${cssEsc(dateISO)}"]`));
        let idx=0;
        for(const key of Object.keys(groups)){
          const blockEl = slots[idx++]; if(!blockEl) break;
          const arr = groups[key];
          const [loc, stawka, time] = key.split("|");
          if(time){ blockEl.querySelector('select[data-role="time"]').value = time; }
          const locSel = blockEl.querySelector('select[data-role="lokalizacja"]');
          const locOther = blockEl.querySelector('input[data-role="lokalizacja-inna"]');
          if (loc === "Kokoszki" || loc === "Pruszcz"){ locSel.value = loc; locOther.classList.add("hidden"); locOther.value=""; }
          else { locSel.value = "Inne"; locOther.classList.remove("hidden"); locOther.value = loc || ""; }
          if (stawka){ blockEl.querySelector('select[data-role="stawka"]').value = String(stawka); }
          const selects = blockEl.querySelectorAll('select[data-role="zawodnik"]');
          arr.slice(0,4).forEach((row,i)=>{ if(selects[i]) setSelectValue(selects[i], row.zawodnik); });
          if (arr[0]?.status === 'published') blockEl.classList.add('published');
          applyLocationStyle(blockEl);
        }
      }
    }

    async function overlayFromTreningi(){
      const { data, error } = await supabase
        .from(TABLE_TRENINGI)
        .select("data, time, stawka, location")
        .gte("data", ymd(dates[0]))
        .lte("data", ymd(dates[6]));
      if(error){ console.warn(error); return; }

      const groups = groupBy(data, r => `${r.data}|${r.location || ""}|${r.stawka ?? ""}|${r.time ?? ""}`);
      for (const key of Object.keys(groups)){
        const [dateISO] = key.split("|");
        const blockEl = Array.from(document.querySelectorAll(`.slot[data-date="${cssEsc(dateISO)}"]`)).find(Boolean);
        if (blockEl) blockEl.classList.add('published');
      }
    }

    // ===== Actions =====
    async function savePlan(slotEl){
      const dateISO = slotEl.dataset.date;
      const miesiac = dateISO.slice(0,7);
      const time = (slotEl.querySelector('select[data-role="time"]').value || null);
      const { location, stawka } = getLocAndRate(slotEl);
      const zawodnicy = getPlayers(slotEl);
      const statusEl = slotEl.querySelector(".savestatus");
      statusEl.textContent = "Zapisuję plan…";

      const delRes = await delWhere(TABLE_TERMINARZ, {data: dateISO, location, stawka, time});
      if (delRes.error){ statusEl.innerHTML = `<span class="err">Błąd usuwania: ${escapeHtml(delRes.error.message)}</span>`; return; }

      if (zawodnicy.length){
        const rows = zawodnicy.map(z => ({ zawodnik: z, data: dateISO, miesiac, stawka, location, time, status: 'planned' }));
        const insRes = await supabase.from(TABLE_TERMINARZ).insert(rows);
        if (insRes.error){ statusEl.innerHTML = `<span class="err">Błąd zapisu: ${escapeHtml(insRes.error.message)}</span>`; return; }
      }
      slotEl.classList.remove('published');
      statusEl.innerHTML = `<span class="ok">Plan zapisany ✓</span>`;
      setTimeout(()=>{ statusEl.textContent=''; }, 2000);
    }

    async function publish(slotEl){
      const dateISO = slotEl.dataset.date;
      const miesiac = dateISO.slice(0,7);
      const time = (slotEl.querySelector('select[data-role="time"]').value || null);
      const { location, stawka } = getLocAndRate(slotEl);
      const zawodnicy = getPlayers(slotEl);
      const statusEl = slotEl.querySelector(".savestatus");
      statusEl.textContent = "Publikuję…";

      if (!zawodnicy.length){
        statusEl.innerHTML = `<span class="warn">Wybierz przynajmniej jednego zawodnika.</span>`;
        return;
      }

      const delPlan = await delWhere(TABLE_TERMINARZ, {data: dateISO, location, stawka, time});
      if (delPlan.error){ statusEl.innerHTML = `<span class="err">Błąd przygotowania planu: ${escapeHtml(delPlan.error.message)}</span>`; return; }
      const planRows = zawodnicy.map(z => ({ zawodnik: z, data: dateISO, miesiac, stawka, location, time, status: 'published' }));
      const insPlan = await supabase.from(TABLE_TERMINARZ).insert(planRows);
      if (insPlan.error){ statusEl.innerHTML = `<span class="err">Błąd zapisu planu: ${escapeHtml(insPlan.error.message)}</span>`; return; }

      const delRes = await supabase.from(TABLE_TRENINGI).delete()
        .eq('data', dateISO)
        .eq('time', time)
        .eq('stawka', stawka)
        .eq('location', location);
      if (delRes.error){ statusEl.innerHTML = `<span class="err">Błąd czyszczenia 'treningi': ${escapeHtml(delRes.error.message)}</span>`; return; }

      const baseRows = zawodnicy.map(z => ({ zawodnik: z, data: dateISO, miesiac, stawka, location, time, zapisano: true }));
      try{
        const rows1 = baseRows.map(r => ({...r, [SEND_FROM_TERM_PREFERRED]: true}));
        const ins1 = await supabase.from(TABLE_TRENINGI).insert(rows1);
        if (ins1.error){
          const rows2 = baseRows.map(r => ({...r, [SEND_FROM_TERM_FALLBACK]: true}));
          const ins2 = await supabase.from(TABLE_TRENINGI).insert(rows2);
          if (ins2.error){ statusEl.innerHTML = `<span class="err">Błąd zapisu 'treningi': ${escapeHtml(ins2.error.message)}</span>`; return; }
        }
      }catch(e){
        statusEl.innerHTML = `<span class="err">Błąd zapisu 'treningi'.</span>`; return;
      }

      slotEl.classList.add('published');
      statusEl.innerHTML = `<span class="ok">Opublikowano ✓</span>`;
      setTimeout(()=>{ statusEl.textContent=''; }, 2000);
    }

    async function clearPlan(slotEl){
      const dateISO = slotEl.dataset.date;
      const time = (slotEl.querySelector('select[data-role="time"]').value || null);
      const { location, stawka } = getLocAndRate(slotEl);
      const statusEl = slotEl.querySelector(".savestatus");
      statusEl.textContent = "Usuwam plan…";

      const res = await delWhere(TABLE_TERMINARZ, {data: dateISO, location, stawka, time});
      if (res.error){ statusEl.innerHTML = `<span class="err">Błąd usuwania: ${escapeHtml(res.error.message)}</span>`; return; }
      slotEl.classList.remove('published');
      statusEl.innerHTML = `<span class="ok">Wyczyszczono</span>`;
      setTimeout(()=>{ statusEl.textContent=''; }, 1500);
    }

    // Utils
    function getPlayers(slotEl){
      return Array.from(slotEl.querySelectorAll('select[data-role="zawodnik"]'))
        .map(s => (s.value || "").trim()).filter(Boolean);
    }
    function getLocAndRate(slotEl){
      const locSel = slotEl.querySelector('select[data-role="lokalizacja"]');
      const locOther = slotEl.querySelector('input[data-role="lokalizacja-inna"]');
      const location = locSel.value === "Inne" ? (locOther.value || null) : locSel.value;
      const stawka = Number(slotEl.querySelector('select[data-role="stawka"]').value || 0) || null;
      return { location, stawka };
    }
    const groupBy = (arr, fn) => arr.reduce((m, x) => { const k = fn(x); (m[k]||(m[k]=[])).push(x); return m; }, {});
    function escapeHtml(str){ return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#39;"); }
    function fmtDate(d){return `${d.getDate().toString().padStart(2,"0")}.${(d.getMonth()+1).toString().padStart(2,"0")}.${d.getFullYear()}`}
    function ymd(d){return `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,"0")}-${d.getDate().toString().padStart(2,"0")}`}
    function genTimes(start,end,step){
      const out=[],[sh,sm]=start.split(":").map(Number),[eh,em]=end.split(":").map(Number);
      let d=new Date(2000,0,1,sh,sm);
      const endD=new Date(2000,0,1,eh,em);
      while(d<=endD){out.push(d.toTimeString().slice(0,5));d=new Date(d.getTime()+step*60000);} 
      return out;
    }
    function applyLocationStyle(slotEl){
      const locSel = slotEl.querySelector('select[data-role="lokalizacja"]');
      const loc = locSel.value;
      slotEl.classList.remove("loc-kokoszki","loc-pruszcz","loc-inne");
      if (loc === "Kokoszki") slotEl.classList.add("loc-kokoszki");
      else if (loc === "Pruszcz") slotEl.classList.add("loc-pruszcz");
      else slotEl.classList.add("loc-inne");
    }
    const cssEsc = (s)=> String(s).replaceAll('"','\"');
  </script>
</body>
</html>
